    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #F4F4F7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #222222;
            padding: 1rem;
        }

        .login-card {
            background-color: #FFFFFF;
            width: 100%;
            max-width: 400px;
            padding: 2.5rem 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            border: 1px solid #E5E5EA;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-title {
            color: #8A05BE; 
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .brand-subtitle {
            color: #6E6E73;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #222222;
            margin-bottom: 0.5rem;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 0.875rem 1rem;
            font-size: 1rem;
            border: 1px solid #D2D2D7;
            border-radius: 8px;
            background-color: #FFFFFF;
            color: #222222;
            outline: none;
            transition: all 0.2s ease;
            appearance: none; /* Remove seta padrão do select */
        }

        .form-select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://w3.org' viewBox='0 0 24 24' fill='none' stroke='%236E6E73' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1.25rem;
        }

        .form-input:focus, .form-select:focus {
            border-color: #8A05BE;
            box-shadow: 0 0 0 3px rgba(138, 5, 190, 0.15);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background-color: #8A05BE;
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 1.5rem;
        }

        .btn-submit:hover {
            background-color: #7604A2;
        }

        .btn-submit:disabled {
            background-color: #A2A2A5;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #FFFFFF;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        /* =========================================================================
        // 👇 CONFIGURAÇÃO VISUAL DOS LINKS DE SUPORTE (NU STYLE)
        // ========================================================================= */
        .login-footer-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 1.5rem;
            width: 100%;
        }

        .helper-link {
            font-size: 0.815rem;
            font-weight: 500;
            color: #6E6E73; /* Cor cinza muted original */

            cursor: pointer;
        }

        .helper-link:hover {
            color: #8A05BE; /* Altera cirurgicamente para o Roxo Nu no foco */

        }

        .divider-dot {
            width: 4px;
            height: 4px;
            background-color: #D2D2D7;
            border-radius: 50%;
        }

        /* =========================================================================
        // 📐 DIMENSIONAMENTO DO ÍCONE CORPORATIVO (NU STYLE)
        // ========================================================================= */
        .brand-logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px; /* Aumentado o espaço para o ícone maior respirar */
            margin-bottom: 0.75rem;

    <script>

// ==================================================================
// 1. CONFIGURAÇÃO DE ENDPOINT DIRETO DO BANCO DE DADOS
// ==================================================================
const URL_ENDPOINT_ATIVO = "https://script.google.com/macros/s/AKfycbxHZR2mh1FPerYInd2NX6OL1PYQRgTT972VoyoPJIWb3z6FRyrxLZ9PyAYKpr5DaFY-/exec";
const DOMINIOS_CORPORATIVOS_PERMITIDOS = ["@TELEFONICA", "@ATENTO", "@ACCENTURE"];

/**
 * Alterna a interface para a tela de Cadastro de Usuário
 */
function abrirTelaCadastro(event) {
  if (event) event.preventDefault();
  
  const loginForm = document.getElementById("loginForm");
  const cadastroForm = document.getElementById("cadastroForm");
  
  if (loginForm) loginForm.style.setProperty("display", "none", "important");
  if (cadastroForm) cadastroForm.style.setProperty("display", "block", "important");
  
  console.log("[NAVEGAÇÃO] Tela de cadastro ativada.");
}

/**
 * Alterna a interface de volta para a tela de Login Principal
 */
function voltarParaLogin(event) {
  if (event) event.preventDefault();
  
  const loginForm = document.getElementById("loginForm");
  const cadastroForm = document.getElementById("cadastroForm");
  
  if (cadastroForm) cadastroForm.style.setProperty("display", "none", "important");
  if (loginForm) loginForm.style.setProperty("display", "block", "important");
  
  console.log("[NAVEGAÇÃO] Retornou para a tela de login.");
}

/**
 * MOTOR DE AUTENTICAÇÃO DO PAINEL (LOGIN)
 */
function executarLoginPainel(event) {
  event.preventDefault(); // Impede o reload da página
  
  const email = document.getElementById("loginUser").value.trim();
  const pass = document.getElementById("loginPass").value.trim();
  
  const btn = document.getElementById("btnLogin");
  const spinner = document.getElementById("loginSpinner");
  const btnText = document.getElementById("btnText");
  
  if (!email || !pass) {
    alert("⚠️ Por favor, preencha todos os campos para realizar o login.");
    return;
  }
  
  // Ativa feedback visual de carregamento
  if (btn) btn.disabled = true;
  if (spinner) spinner.style.display = "block";
  if (btnText) btnText.innerText = "Autenticando...";
  
  // Cria o callback global dinâmico para comunicação estável (JSONP)
  const callbackLoginName = "cbLoginPainel_" + Date.now();
  
  window[callbackLoginName] = function(resposta) {
    // Restaura interface original do botão
    if (btn) btn.disabled = false;
    if (spinner) spinner.style.display = "none";
    if (btnText) btnText.innerText = "Acessar Painel";
    
    if (resposta && respuesta.success) {
      // Regra de Negócio: Se o status for ON, mas o token OTP do cadastro ainda não foi validado
      if (resposta.exigirOTP) {
        alert(`🔑 Primeiro Acesso Detectado!\nUm código de verificação foi enviado para o e-mail cadastrado.`);
        // Aqui você pode abrir seu modal de OTP, ex: abrirModalOtpConf();
        return;
      }
      
      alert(`🎉 Autenticação realizada com sucesso!\nBem-vindo(a), ${resposta.nome}.`);
      // Guarda os dados de sessão se necessário
      localStorage.setItem("user_logado", resposta.email);
      // Redireciona para o painel principal logado
      // window.location.href = "dashboard.html";
    } else {
      alert("❌ Falha na Autenticação:\n" + (resposta.error || "Usuário ou senha inválidos."));
    }
    
    // Deleta a função temporária da memória
    delete window[callbackLoginName];
  };
  
  // Monta a QueryString apontando para a action de login no banco central
  const urlCompletaLogin = URL_ENDPOINT_ATIVO + 
    "?action=validarLoginPainel" + 
    "&usuario=" + encodeURIComponent(email) + 
    "&senha=" + encodeURIComponent(pass) + 
    "&callback=" + callbackLoginName;
  
  const scriptLoginTag = document.createElement("script");
  scriptLoginTag.src = urlCompletaLogin;
  scriptLoginTag.async = true;
  
  scriptLoginTag.onload = function() { 
    if (scriptLoginTag.parentNode) document.body.removeChild(scriptLoginTag); 
  };
  
  scriptLoginTag.onerror = function() {
    if (scriptLoginTag.parentNode) document.body.removeChild(scriptLoginTag);
    if (btn) btn.disabled = false;
    if (spinner) spinner.style.display = "none";
