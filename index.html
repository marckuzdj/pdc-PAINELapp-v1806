    <title>PAINEL | VIVO PDC</title>
    
    <!-- 🌟 CORREÇÃO CIRÚRGICA: Link oficial e completo da fonte Inter cadastrado corretamente -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #F4F4F7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #222222;
            padding: 1rem;
        }

        .login-card {
            background-color: #FFFFFF;
            width: 100%;
            max-width: 400px;
            padding: 2.5rem 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            border: 1px solid #E5E5EA;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-title {
            color: #8A05BE; 
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .brand-subtitle {
            color: #6E6E73;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #222222;
            margin-bottom: 0.5rem;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 0.875rem 1rem;
            font-size: 1rem;
            border: 1px solid #D2D2D7;
            border-radius: 8px;
            background-color: #FFFFFF;
            color: #222222;
            outline: none;
            transition: all 0.2s ease;
            appearance: none; /* Remove seta padrão do select */
        }

        .form-select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://w3.org' viewBox='0 0 24 24' fill='none' stroke='%236E6E73' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1.25rem;
        }

        .form-input:focus, .form-select:focus {
            border-color: #8A05BE;
            box-shadow: 0 0 0 3px rgba(138, 5, 190, 0.15);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background-color: #8A05BE;
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 1.5rem;
        }

        .btn-submit:hover {
            background-color: #7604A2;
        }

        .btn-submit:disabled {
            background-color: #A2A2A5;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #FFFFFF;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        /* =========================================================================
        // 👇 CONFIGURAÇÃO VISUAL DOS LINKS DE SUPORTE (NU STYLE)
        // ========================================================================= */
        .login-footer-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 1.5rem;
            width: 100%;
        }

        .helper-link {
            font-size: 0.815rem;
            font-weight: 500;
            color: #6E6E73; /* Cor cinza muted original */
            text-decoration: none;
            transition: color 0.2s ease;
            cursor: pointer;
        }

        .helper-link:hover {
            color: #8A05BE; /* Altera cirurgicamente para o Roxo Nu no foco */
            text-decoration: underline;
        }

        .divider-dot {
            width: 4px;
            height: 4px;
            background-color: #D2D2D7;
            border-radius: 50%;
        }

        /* =========================================================================
        // 📐 DIMENSIONAMENTO DO ÍCONE CORPORATIVO (NU STYLE)
        // ========================================================================= */
        .brand-logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px; /* Aumentado o espaço para o ícone maior respirar */
            margin-bottom: 0.75rem;
            width: 100%;
        }

        .brand-icon {
            width: 56px;  /* Tamanho expandido para o ícone ganhar destaque */
            height: 56px;
            object-fit: contain;
            display: block;
            margin-bottom: 4px; /* Ajuste milimétrico de horizonte vertical */
        }

        /* Ajuste fino na margem do título para casar com o contêiner flexível */
        .brand-title {
            color: #8A05BE; 
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0 !important; /* Mantém zerado para alinhar com o centro do ícone */
        }


   
    </style>
</head>

    /**
     * Fase 2: Executa a validação e submissão das credenciais via transmissão JSONP

    function executarLoginPainel(event) {
        event.preventDefault();
        
        const user = document.getElementById("loginUser").value.trim();
        const pass = document.getElementById("loginPass").value.trim();
        const btn = document.getElementById("btnLogin");
        const spinner = document.getElementById("loginSpinner");
        const btnText = document.getElementById("btnText");

        if (btn) btn.disabled = true;
        if (spinner) spinner.style.display = "block";
        if (btnText) btnText.innerText = "Autenticando...";

        console.log(`🔒 [LOGIN] Enviando credenciais para o cluster ${UF_SELECIONADA}...`);

        const callbackName = "cbLoginPainel_" + Date.now();
        
        window[callbackName] = function(resposta) {
            if (btn) btn.disabled = false;
            if (spinner) spinner.style.display = "none";
            if (btnText) btnText.innerText = "Acessar Painel";

            if (resposta && resposta.success) {
                alert(`🎉 Login autorizado com sucesso para a UF: ${UF_SELECIONADA}!`);
                console.log("Sessão iniciada:", resposta.dadosUsuario);
            } else {
                alert("❌ Erro de Autenticação: " + (resposta.error || "Credenciais inválidas."));
            }

            delete window[callbackName];
        };

        const urlCompleta = `${URL_ENDPOINT_ATIVO}` + 
                            `?action=validarLoginPainel` + 
                            `&usuario=${encodeURIComponent(user)}` + 
                            `&senha=${encodeURIComponent(pass)}` + 
                            `&uf=${encodeURIComponent(UF_SELECIONADA)}` + 
                            `&callback=${callbackName}`;

        const scriptTag = document.createElement("script");
        scriptTag.src = urlCompleta;
        scriptTag.async = true;
        
        scriptTag.onload = function() { 
            if (scriptTag.parentNode) document.body.removeChild(scriptTag); 
        };
        scriptTag.onerror = function() {
            if (scriptTag.parentNode) document.body.removeChild(scriptTag);
            if (btn) btn.disabled = false;
            if (spinner) spinner.style.display = "none";
            if (btnText) btnText.innerText = "Acessar Painel";
            alert("❌ Falha de comunicação com o servidor da UF. Verifique sua conexão.");
        };

        document.body.appendChild(scriptTag);
    }

    /**
     * 📝 MOTOR DE CADASTRO: Valida os dados localmente e envia para o servidor via JSONP
     */
    /**
     * MOTOR DE CADASTRO ATUALIZADO COM AS 4 REGRAS CORPORATIVAS
     */
// ==================================================================
// CONFIGURAÇÃO DOS DOMÍNIOS PERMITIDOS (FÁCIL ATUALIZAÇÃO)
// ==================================================================
    const DOMINIOS_CORPORATIVOS_PERMITIDOS = ["@TELEFONICA", "@ATENTO", "@ACCENTURE"];
    
    /**
     * MOTOR DE CADASTRO PAINEL COM VALIDAÇÕES LOCAIS E GERAÇÃO DE OTP
     */
    function executarCadastroPainel(event) {
      event.preventDefault(); // Impede o reload da página
      
      // Captura e limpa os inputs do formulário
      const nomeCompleto = document.getElementById("cadNome").value.trim();
      const emailInput = document.getElementById("cadUser").value.trim();
      const pass = document.getElementById("cadPass").value.trim();
      const passConfirm = document.getElementById("cadPassConfirm").value.trim();
      const centroLogistico = document.getElementById("cadCentro").value.trim();
      
      const btn = document.getElementById("btnCadastrar");
      const spinner = document.getElementById("cadSpinner");
      const btnText = document.getElementById("btnCadText");
      
      // -----------------------------------------------------------------------
      // REGRA 1: TODOS OS CAMPOS SÃO MANDATÓRIOS
      // -----------------------------------------------------------------------
      if (!nomeCompleto || !emailInput || !pass || !passConfirm || !centroLogistico) {
        alert("⚠️ Atenção: Todos os campos do formulário são de preenchimento obrigatório.");
        return;
      }
      
      // -----------------------------------------------------------------------
      // REGRA 3: MATCH FIELDS PARA PASSWORD (CRITÉRIOS FRONT-CONF/FRONT-OL)
      // -----------------------------------------------------------------------
      if (pass !== passConfirm) {
        alert("❌ Erro de Validação: As senhas informadas não coincidem.");
        document.getElementById("cadPassConfirm").focus();
        return;
      }
      
      // Exemplo de critério padrão mantido dos outros fronts (mínimo 4 ou 6 caracteres puramente texto)
      if (pass.length < 5) {
        alert("⚠️ A senha corporativa deve conter no mínimo 5 caracteres.");
        document.getElementById("cadPass").focus();
        return;
      }
      
      // -----------------------------------------------------------------------
      // REGRA 2: VALIDAÇÃO DE STRING DE E-MAIL (DOMÍNIOS CORPORATIVOS)
      // -----------------------------------------------------------------------
      const emailUpper = emailInput.toUpperCase();
      const possuiDominioValido = DOMINIOS_CORPORATIVOS_PERMITIDOS.some(dominio => emailUpper.includes(dominio));
      
      if (!possuiDominioValido) {
        alert(`❌ Acesso Negado: O e-mail informado deve pertencer a um dos domínios homologados:\n${DOMINIOS_CORPORATIVOS_PERMITIDOS.join(", ").toLowerCase()}`);
        document.getElementById("cadUser").focus();
        return;
      }
      
      // -----------------------------------------------------------------------
      // REGRA 4: GERAÇÃO DO OTP ALFANUMÉRICO DE 4 DÍGITOS (HERDADO DO FRONT-CONF/OL)
      // -----------------------------------------------------------------------
      const caracteresOtp = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
      let otpGerado = "";
      for (let i = 0; i < 4; i++) {
        const indiceAleatorio = Math.floor(Math.random() * caracteresOtp.length);
        otpGerado += caracteresOtp.charAt(indiceAleatorio);
      }
      console.log(`[SEGURANÇA] Chave OTP Temporária de Primeiro Acesso Gerada: ${otpGerado}`);
      
      // Ativa estado visual de processamento
      if (btn) btn.disabled = true;
      if (spinner) spinner.style.display = "block";
      if (btnText) btnText.innerText = "Registrando na Doca...";
      
      // Nome do callback JSONP dinâmico
      const callbackCadName = "cbCadastroPainel_" + Date.now();
      
      window[callbackCadName] = function(resposta) {
        // Restaura interface
        if (btn) btn.disabled = false;
        if (spinner) spinner.style.display = "none";
        if (btnText) btnText.innerText = "Solicitar Cadastro";
        
        if (resposta && respuesta.success) {
          alert(`🎉 Usuário cadastrado com sucesso no ecossistema PAINEL PDC!\nChave de Ativação OTP: ${otpGerado}\n\nO token foi enviado para ${emailInput.toLowerCase()} para validação no primeiro acesso.`);
          document.getElementById("cadastroForm").reset();
          voltarParaLogin(new Event('click')); // Retorna o operador à tela de autenticação
        } else {
          alert("❌ Erro no Servidor:\n" + (resposta.error || "Não foi possível consolidar os dados cadastrais."));
        }
        delete window[callbackCadName];
      };
      
      // -----------------------------------------------------------------------
      // ESTRUTURAÇÃO DO PAYLOAD EXACT MATCH COM A TABELA_6 (PLANILHA)
      // -----------------------------------------------------------------------
      const urlCompletaCad = URL_ENDPOINT_ATIVO + 
        "?action=gravarCadastroDiretoPainel" + 
        "&lgnUSER=" + encodeURIComponent(emailInput) + 
        "&lgnPWD=" + encodeURIComponent(pass) + 
        "&lgnNome=" + encodeURIComponent(nomeCompleto) + 
        "&lgnRegional=" + encodeURIComponent(centroLogistico) + 
        "&otp=" + encodeURIComponent(otpGerado) + 
        "&callback=" + callbackCadName;
      
      console.log("-> Transmitindo pacotes para a esteira de destino...");
      
      const scriptCadTag = document.createElement("script");
      scriptCadTag.src = urlCompletaCad;
      scriptCadTag.async = true;
      
      scriptCadTag.onload = function() { 
        if (scriptCadTag.parentNode) document.body.removeChild(scriptCadTag); 
      };
      
      scriptCadTag.onerror = function() {
        if (scriptCadTag.parentNode) document.body.removeChild(scriptCadTag);
        if (btn) btn.disabled = false;
        if (spinner) spinner.style.display = "none";
        if (btnText) btnText.innerText = "Solicitar Cadastro";
        alert("❌ Falha de comunicação de barramento de rede. Verifique seu Deploy do AppsScript.");
      };
      
      document.body.appendChild(scriptCadTag);
    }



        /**
         * 🔒 TRAVA ANTI-F5: Intercepta e impede o recarregamento ou fechamento da página
         */
        function bloquearRecarregamentoDoPainel(event) {
            // Cancela o evento original de fechamento imediato
            event.preventDefault();
            
            // Configuração obrigatória exigida pelos navegadores modernos (Chrome, Safari, Edge)
            event.returnValue = "As alterações não salvas podem ser perdidas. Deseja realmente sair?";
            return event.returnValue;
        }
        
        /**
         * Ativa a trava de segurança em todo o navegador
         */
        function ligarTravaDeSegurancaF5() {
            console.log("🛡️ [SEGURANÇA] Trava anti-F5 ativada no navegador.");
            window.addEventListener('beforeunload', bloquearRecarregamentoDoPainel);
        }
        
        /**
         * Desliga a trava de segurança (Essencial para permitir redirecionamentos legítimos de sucesso)
         */
        function desligarTravaDeSegurancaF5() {
            console.log("🔓 [SEGURANÇA] Trava anti-F5 desativada.");
            window.removeEventListener('beforeunload', bloquearRecarregamentoDoPainel);
        }
