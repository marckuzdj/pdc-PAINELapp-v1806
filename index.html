<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL | VIVO PDC</title>
    
    <!-- 🌟 CORREÇÃO CIRÚRGICA: Link oficial e completo da fonte Inter cadastrado corretamente -->
    <!-- <link href="https://googleapis.com" rel="stylesheet">  -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #F4F4F7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #222222;
            padding: 1rem;
        }

        .login-card {
            background-color: #FFFFFF;
            width: 100%;
            max-width: 400px;
            padding: 2.5rem 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            border: 1px solid #E5E5EA;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-title {
            color: #8A05BE; 
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .brand-subtitle {
            color: #6E6E73;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #222222;
            margin-bottom: 0.5rem;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 0.875rem 1rem;
            font-size: 1rem;
            border: 1px solid #D2D2D7;
            border-radius: 8px;
            background-color: #FFFFFF;
            color: #222222;
            outline: none;
            transition: all 0.2s ease;
            appearance: none; /* Remove seta padrão do select */
        }

        .form-select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://w3.org' viewBox='0 0 24 24' fill='none' stroke='%236E6E73' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1.25rem;
        }

        .form-input:focus, .form-select:focus {
            border-color: #8A05BE;
            box-shadow: 0 0 0 3px rgba(138, 5, 190, 0.15);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background-color: #8A05BE;
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 1.5rem;
        }

        .btn-submit:hover {
            background-color: #7604A2;
        }

        .btn-submit:disabled {
            background-color: #A2A2A5;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #FFFFFF;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        /* =========================================================================
        // 👇 CONFIGURAÇÃO VISUAL DOS LINKS DE SUPORTE (NU STYLE)
        // ========================================================================= */
        .login-footer-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 1.5rem;
            width: 100%;
        }

        .helper-link {
            font-size: 0.815rem;
            font-weight: 500;
            color: #6E6E73; /* Cor cinza muted original */
            text-decoration: none;
            transition: color 0.2s ease;
            cursor: pointer;
        }

        .helper-link:hover {
            color: #8A05BE; /* Altera cirurgicamente para o Roxo Nu no foco */
            text-decoration: underline;
        }

        .divider-dot {
            width: 4px;
            height: 4px;
            background-color: #D2D2D7;
            border-radius: 50%;
        }

        /* =========================================================================
        // 📐 DIMENSIONAMENTO DO ÍCONE CORPORATIVO (NU STYLE)
        // ========================================================================= */
        .brand-logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px; /* Aumentado o espaço para o ícone maior respirar */
            margin-bottom: 0.75rem;
            width: 100%;
        }

        .brand-icon {
            width: 56px;  /* Tamanho expandido para o ícone ganhar destaque */
            height: 56px;
            object-fit: contain;
            display: block;
            margin-bottom: 4px; /* Ajuste milimétrico de horizonte vertical */
        }

        /* Ajuste fino na margem do título para casar com o contêiner flexível */
        .brand-title {
            color: #8A05BE; 
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0 !important; /* Mantém zerado para alinhar com o centro do ícone */
        }

    </style>
</head>
<body>

<div class="login-card">

    <!-- =========================================================================
    // 🌟 INJEÇÃO FIXA: O CABEÇALHO AGORA FICA FORA DOS FORMULÁRIOS (SEMPRE VISÍVEL)
    // ========================================================================= -->
    <div class="brand-header">
        <div class="brand-logo-container">
            <!-- Link da imagem Base64 restaurado para a logo reaparecer -->
            <img class="brand-icon" src="" alt="Logo">
            <h1 class="brand-title">PASSAGEM DE CARGA</h1>
        </div>
        <p class="brand-subtitle">PAINEL ADMINISTRATIVO v5</p>
    </div>

    <!-- ========================================================================= -->
    <!-- TELA 1: COMENTADA / TOTALMENTE ISOLADA                                    -->
    <!-- ========================================================================= -->
    <div id="viewRegiao" style="display: none !important;"></div>

    <!-- ========================================================================= -->
    <!-- TELA 2: LOGIN TRADICIONAL (SEM O CABEÇALHO DENTRO)                         -->
    <!-- ========================================================================= -->
    <form id="loginForm" style="display: block !important;" onsubmit="executarLoginPainel(event)">
        
        <div class="form-group">
            <label class="form-label" for="loginUser">E-mail Corporativo</label>
            <input class="form-input" type="email" id="loginUser" placeholder="nome@operador.com.br" required>
        </div>

        <div class="form-group">
            <label class="form-label" for="loginPass">Senha de Acesso</label>
            <input class="form-input" type="password" id="loginPass" placeholder="••••••••" required>
        </div>

        <button type="submit" id="btnLogin" class="btn-submit">
            <div id="loginSpinner" class="spinner"></div>
            <span id="btnText">Acessar Painel</span>
        </button>

        <div class="login-footer-links">
            <a href="#" onclick="solicitarRecuperacaoSenha(event)" class="helper-link">Esqueci minha senha</a>
            <div class="divider-dot"></div>
            <a href="#" onclick="abrirTelaCadastro(event)" class="helper-link">Não tem conta? Cadastre-se</a>
        </div>
        
    </form>

    <!-- ========================================================================= -->
    <!-- TELA 3: CADASTRO DE USUÁRIO (NASCENDO OCULTO E SEM REPETIR O CABEÇALHO)    -->
    <!-- ========================================================================= -->
    <form id="cadastroForm" style="display: none !important;" onsubmit="executarCadastroPainel(event)">

        <div class="form-group">
            <label class="form-label" for="cadNome">Nome Completo</label>
            <input class="form-input" type="text" id="cadNome" placeholder="Seu nome completo" required>
        </div>

        <div class="form-group">
            <label class="form-label" for="cadUser">E-mail Corporativo</label>
            <input class="form-input" type="email" id="cadUser" placeholder="nome@operador.com.br" required>
        </div>

        <div class="form-group">
            <label class="form-label" for="cadPass">Criar Senha</label>
            <input class="form-input" type="password" id="cadPass" placeholder="Mínimo 6 caracteres" required>
        </div>

        <div class="form-group">
            <label class="form-label" for="cadPassConfirm">Repetir Senha</label>
            <input class="form-input" type="password" id="cadPassConfirm" placeholder="Confirme sua senha" required>
        </div>


            <!-- 🌟 NOVO: Combobox Centro com a sua listagem de operadoras homologadas -->
            <!-- 🌟 ATUALIZAÇÃO DE IDENTIFICAÇÃO: Atributos 'value' igualados aos textos visuais reais -->
        <div class="form-group">
            <label class="form-label" for="cadCentro">Centro / Filial Logística</label>
                <select id="cadCentro" class="form-select" placeholder="Selecione a Região" required>
                    <option value="" disabled selected>Selecione a Região</option>
                    <option value="AL/ALW1">AL/ALW1</option>
                    <option value="BA/BAW1">BA/BAW1</option>
                    <option value="CE/CEW1">CE/CEW1</option>
                    <option value="ES/ESW1">ES/ESW1</option>
                    <option value="MG/MNW5">MG/MNW5</option>
                    <option value="PB/PBW1">PB/PBW1</option>
                    <option value="PR/PRW1">PR/PRW1</option>
                    <option value="PE/PEW1">PE/PEW1</option>
                    <option value="PI/PIW1">PI/PIW1</option>
                    <option value="RJ/RJW5">RJ/RJW5</option>
                    <option value="RN/RNW1">RN/RNW1</option>
                    <option value="RS/RSW1">RS/RSW1</option>
                    <option value="SC/SCW1">SC/SCW1</option>
                    <option value="SP/SPW1">SP/SPW1</option>
                    <option value="SP/DSP1">SP/DSP1</option>
                    <option value="SE/SEW1">SE/SEW1</option>
                </select>
            </div>

            <button type="submit" id="btnCadastrar" class="btn-submit">
                <div id="cadSpinner" class="spinner"></div>
                <span id="btnCadText">Solicitar Cadastro</span>
            </button>
    
            <div class="login-footer-links">
                <a href="#" onclick="voltarParaLogin(event)" class="helper-link">Já tem uma conta? Faça Login</a>
            </div>

    </form>
        
    </div>

    <script>

// ==================================================================
// 1. CONFIGURAÇÃO DE ENDPOINT DIRETO DO BANCO DE DADOS
// ==================================================================
// Certifique-se de colar aqui a sua URL do Web App gerada no deploy do seu Código.gs
const URL_ENDPOINT_ATIVO = "https://script.google.com/macros/s/AKfycbxHZR2mh1FPerYInd2NX6OL1PYQRgTT972VoyoPJIWb3z6FRyrxLZ9PyAYKpr5DaFY-/exec";
const DOMINIOS_CORPORATIVOS_PERMITIDOS = ["@TELEFONICA", "@ATENTO", "@ACCENTURE"];

/**
 * Alterna a interface para a tela de Cadastro de Usuário
 */
function abrirTelaCadastro(event) {
  if (event) event.preventDefault();
  
  const loginForm = document.getElementById("loginForm");
  const cadastroForm = document.getElementById("cadastroForm");
  
  if (loginForm) loginForm.style.setProperty("display", "none", "important");
  if (cadastroForm) cadastroForm.style.setProperty("display", "block", "important");
  
  console.log("[NAVEGAÇÃO] Tela de cadastro ativada.");
}

/**
 * Alterna a interface de volta para a tela de Login Principal
 */
function voltarParaLogin(event) {
  if (event) event.preventDefault();
  
  const loginForm = document.getElementById("loginForm");
  const cadastroForm = document.getElementById("cadastroForm");
  
  if (cadastroForm) cadastroForm.style.setProperty("display", "none", "important");
  if (loginForm) loginForm.style.setProperty("display", "block", "important");
  
  console.log("[NAVEGAÇÃO] Retornou para a tela de login.");
}

/**
 * MOTOR DE CADASTRO PAINEL (CORRIGIDO E TOTALMENTE INDEPENDENTE)
 */
function executarCadastroPainel(event) {
  event.preventDefault(); // Impede o reload físico da página
  console.log("[CADASTRO] Evento de submissão interceptado com sucesso.");

  // Elementos do formulário capturados com travas de segurança contra IDs errados
  const elNome = document.getElementById("cadNome");
  const elUser = document.getElementById("cadUser");
  const elPass = document.getElementById("cadPass");
  const elPassConfirm = document.getElementById("cadPassConfirm");
  const elCentro = document.getElementById("cadCentro");

  const btn = document.getElementById("btnCadastrar");
  const spinner = document.getElementById("cadSpinner");
  const btnText = document.getElementById("btnCadText");

  // Alerta preventivo se o HTML estiver com os IDs errados
  if (!elNome || !elUser || !elPass || !elPassConfirm || !elCentro) {
    console.error("[ERRO HTML] Um ou mais IDs de elementos estão desalinhados.", { elNome, elUser, elPass, elPassConfirm, elCentro });
    alert("❌ Falha interna: Os IDs dos campos do formulário HTML não batem com o motor do JavaScript.");
    return;
  }

  const nomeCompleto = elNome.value.trim();
  const emailInput = elUser.value.trim();
  const pass = elPass.value.trim();
  const passConfirm = elPassConfirm.value.trim();
  const centroLogistico = elCentro.value.trim();

  // -----------------------------------------------------------------------
  // REGRA 1: TODOS OS CAMPOS SÃO MANDATÓRIOS
  // -----------------------------------------------------------------------
  if (!nomeCompleto || !emailInput || !pass || !passConfirm || !centroLogistico) {
    alert("⚠️ Atenção: Todos os campos do formulário são de preenchimento obrigatório.");
    return;
  }

  // -----------------------------------------------------------------------
  // CRITÉRIOS DE COMPLEXIDADE REQUISITADOS PARA A SENHA CORPORATIVA
  // -----------------------------------------------------------------------
  if (pass !== passConfirm) {
    alert("❌ Erro de Validação: As senhas informadas não coincidem.");
    elPassConfirm.focus();
    return;
  }

  // Regex de Segurança Avançada: Valida maiúscula, minúscula, número, caractere especial e tamanho mínimo de 8
  const regexSenhaForte = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&_#^.+-])[A-Za-z\d@$!%*?&_#^.+-]{8,}$/;

  if (!regexSenhaForte.test(pass)) {
    alert(
      "❌ Política de Senha Violada!\n\n" +
      "Sua senha de acesso deve atender obrigatoriamente aos seguintes critérios:\n" +
      "• Conter no mínimo 8 caracteres\n" +
      "• Conter pelo menos uma letra MAIÚSCULA\n" +
      "• Conter pelo menos uma letra minúscula\n" +
      "• Conter pelo menos um número\n" +
      "• Conter pelo menos um caractere especial (@, #, $, %, &, *, !, _, -, .)"
    );
    elPass.focus();
    return;
  }


  // -----------------------------------------------------------------------
  // REGRA 2: VALIDAÇÃO DE DOMÍNIOS CORPORATIVOS
  // -----------------------------------------------------------------------
  const emailUpper = emailInput.toUpperCase();
  const possuiDominioValido = DOMINIOS_CORPORATIVOS_PERMITIDOS.some(dominio => emailUpper.includes(dominio));

  if (!possuiDominioValido) {
    alert(`❌ Acesso Negado: O e-mail informado deve pertencer a um dos domínios homologados:\n${DOMINIOS_CORPORATIVOS_PERMITIDOS.join(", ").toLowerCase()}`);
    elUser.focus();
    return;
  }

  // EXTRAÇÃO AUTOMÁTICA DA UF (Baseado no início do campo Centro ex: "SP/SPW1" vira "SP")
  let ufExtraida = "GERAL";
  if (centroLogistico.includes("/")) {
    ufExtraida = centroLogistico.split("/")[0].trim().toUpperCase();
  } else if (centroLogistico.length >= 2) {
    ufExtraida = centroLogistico.substring(0, 2).toUpperCase();
  }

  // GERAÇÃO DO OTP ALFANUMÉRICO DE 4 DÍGITS
  const caracteresOtp = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let otpGerado = "";
  for (let i = 0; i < 4; i++) {
    otpGerado += caracteresOtp.charAt(Math.floor(Math.random() * caracteresOtp.length));
  }
  console.log(`[SEGURANÇA] Chave OTP Temporária Gerada para ${emailInput}: ${otpGerado} (Região: ${ufExtraida})`);

  // Ativa estado visual de carregamento no botão
  if (btn) btn.disabled = true;
  if (spinner) spinner.style.display = "block";
  if (btnText) btnText.innerText = "Registrando na Doca...";

  // Cria o callback global JSONP corrigido
  const callbackCadName = "cbCadastroPainel_" + Date.now();

  window[callbackCadName] = function(resposta) {
    // Restaura o estado original dos botões da tela
    if (btn) btn.disabled = false;
    if (spinner) spinner.style.display = "none";
    if (btnText) btnText.innerText = "Solicitar Cadastro";

    if (resposta && resposta.success) {
      // 1. Limpa o formulário de cadastro físico
      const formFisico = document.getElementById("cadastroForm");
      if (formFisico) formFisico.reset();
      
      // 2. Aciona a exibição do Modal Customizado na tela
      const modal = document.getElementById("modalSucessoCadastro");
      if (modal) {
        modal.style.setProperty("display", "flex", "important");
        modal.classList.remove("hidden");
        // Efeito suave de subida no conteúdo interno
        setTimeout(() => {
          const content = modal.querySelector(".modal-content");
          if (content) content.style.transform = "translateY(0)";
        }, 50);
      } else {
        // Fallback de segurança caso o ID do modal não seja localizado no DOM
        alert("Usuário cadastrado com sucesso. Sua chave de ativação foi enviada ao e-mail informado. Use-a no primeiro acesso!");
        voltarParaLogin(new Event('click'));
      }
    } else {
      alert("❌ Não permitido:\n" + (resposta.error || "Não foi possível consolidar os dados cadastrais."));
    }
    delete window[callbackCadName];
  };


  // Montagem transparente do link de rede apontando para a action do banco mestre
  const urlCompletaCad = URL_ENDPOINT_ATIVO + 
    "?action=gravarCadastroDiretoPainel" + 
    "&lgnUSER=" + encodeURIComponent(emailInput) + 
    "&lgnPWD=" + encodeURIComponent(pass) + 
    "&lgnNome=" + encodeURIComponent(nomeCompleto) + 
    "&lgnRegional=" + encodeURIComponent(centroLogistico) + 
    "&otp=" + encodeURIComponent(otpGerado) + 
    "&callback=" + callbackCadName;

  const scriptCadTag = document.createElement("script");
  scriptCadTag.src = urlCompletaCad;
  scriptCadTag.async = true;

  scriptCadTag.onload = function() { 
    if (scriptCadTag.parentNode) document.body.removeChild(scriptCadTag); 
  };

  scriptCadTag.onerror = function() {
    if (scriptCadTag.parentNode) document.body.removeChild(scriptCadTag);
    if (btn) btn.disabled = false;
    if (spinner) spinner.style.display = "none";
    if (btnText) btnText.innerText = "Solicitar Cadastro";
    alert("❌ Falha de barramento: O servidor mestre demorou para responder ou a URL está incorreta.");
  };

  document.body.appendChild(scriptCadTag);
}

/**
 * Fecha o modal de sucesso e redireciona o fluxo para a tela de login principal
 */
function fecharModalSucessoCadastro() {
  const modal = document.getElementById("modalSucessoCadastro");
  if (modal) {
    const content = modal.querySelector(".modal-content");
    if (content) content.style.transform = "translateY(100%)";
    
    setTimeout(() => {
      modal.style.setProperty("display", "none", "important");
      modal.classList.add("hidden");
      // Retorna o operador para a tela de Login automaticamente
      voltarParaLogin(new Event('click'));
    }, 200);
  }
}

        
    </script>

<!-- =========================================================================
// 🌟 MODAL DE SUCESSO DO CADASTRO (CUSTOMIZADO)
// ========================================================================= -->
<div id="modalSucessoCadastro" class="modal-container hidden" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center;">
    <div class="modal-content" style="background: #ffffff; padding: 30px; border-radius: 12px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.15); margin: auto; transform: translateY(100%); transition: transform 0.3s ease;">
        <div style="font-size: 48px; color: #800080; margin-bottom: 15px;">🎉</div>
        <h3 style="margin-bottom: 15px; color: #333333; font-family: sans-serif; font-weight: 600;">Cadastro Concluído!</h3>
        <p style="color: #666666; font-size: 15px; line-height: 1.5; margin-bottom: 25px; font-family: sans-serif;">
            Usuário cadastrado com sucesso. Sua chave de ativação foi enviada ao e-mail informado. Use-a no primeiro acesso!
        </p>
        <button onclick="fecharModalSucessoCadastro()" class="btn-submit" style="width: 100%; padding: 12px; background: #800080; color: #ffffff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;">
            <span>Entendi</span>
        </button>
    </div>
</div>

    
</body>
</html>
